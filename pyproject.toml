[project]
name = "supervisor"
version = "0.1.0"
description = "AI-powered infrastructure monitoring engine"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27.0",
    "croniter>=2.0",
]

[project.scripts]
supervisor = "supervisor.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]
