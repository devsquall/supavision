name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Verify tag matches pyproject.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(grep -E "^version = " pyproject.toml | cut -d'"' -f2)
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (v$tag_version) does not match pyproject.toml version $pyproject_version"
            exit 1
          fi
          init_version=$(grep -E "^__version__ = " src/supavision/__init__.py | cut -d'"' -f2)
          if [ "$tag_version" != "$init_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (v$tag_version) does not match __init__.py version $init_version"
            exit 1
          fi

      - name: Build distribution
        run: python -m build

      - name: Verify distribution contents
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # If PyPI trusted publishing isn't configured on the project, set
        # PYPI_API_TOKEN as a repository secret and uncomment the `with:` block below.
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
