{% extends "base.html" %}
{% block title %}Dashboard - Supervisor{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Dashboard</h2>
  <input type="search" class="form-input" placeholder="Search resources..."
         style="max-width:240px; height:32px;"
         hx-get="/dashboard/overview" hx-trigger="input changed delay:300ms, search"
         hx-target="#overview" hx-include="this" name="q">
</div>

<div id="overview" hx-get="/dashboard/overview" hx-trigger="load, every 30s, refreshResources from:body" hx-swap="innerHTML"
     role="region" aria-label="Dashboard overview" aria-live="polite">
  <div class="stats-grid">
    <div class="stat-card"><div class="skeleton" style="height:48px;"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:48px;"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:48px;"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:48px;"></div></div>
  </div>
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
</div>
{% endblock %}
