<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Supervisor{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-brand">Supervisor</a>
      <ul class="nav-links">
        <li><a href="/">Dashboard</a></li>
      </ul>
    </div>
  </nav>
  <main class="container main" role="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="container footer">Supervisor &mdash; AI-powered infrastructure monitoring</footer>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>
  <script src="/static/supervisor.js"></script>
</body>
</html>
