{% if activities %}
<div class="cc-activity-list">
  {% for a in activities %}
  <div class="cc-activity-item">
    {% if a.status == 'running' %}
    <span class="spinner spinner--sm"></span>
    {% else %}
    <span class="status-dot status-dot--unknown status-dot--md"></span>
    {% endif %}
    <div class="cc-activity-body">
      <a href="{{ a.link }}" class="cc-activity-label">{{ a.label }}</a>
      <span class="cc-activity-type">{{ a.type }}</span>
    </div>
    <span class="badge badge--{{ 'running' if a.status == 'running' else a.status }}">{{ a.status }}</span>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="cc-empty-panel">
  <svg aria-hidden="true" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32" style="opacity:0.4; margin-bottom:8px"><circle cx="24" cy="24" r="20"/><path d="M24 14v10l7 7"/></svg>
  <div>System is idle. <a href="/resources" class="text-link text-sm">Run a health check</a> to see live output.</div>
</div>
{% endif %}
